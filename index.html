<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tripplounge</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f4ef;
      color: #1f1f1f;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
    }
    .card {
      max-width: 700px;
      background: white;
      padding: 48px 32px;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }
    h1 {
      font-size: 42px;
      margin-bottom: 12px;
    }
    p {
      font-size: 18px;
      line-height: 1.6;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Tripplounge</h1>
    <p>White-label trip pages for travel advisors.</p>
  </div>
</body>
</html>
